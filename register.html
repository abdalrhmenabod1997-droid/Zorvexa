<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | Zorvexa</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.box{
background:#111827;
padding:30px;
border-radius:12px;
width:350px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#00d4ff;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

a{
display:block;
text-align:center;
margin-top:15px;
color:#00d4ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
<h2>إنشاء حساب</h2>

<input type="text" placeholder="الاسم الكامل">
<input type="email" placeholder="البريد الإلكتروني">
<input type="password" placeholder="كلمة المرور">
<input type="password" placeholder="تأكيد كلمة المرور">

<button>إنشاء الحساب</button>

<a href="login.html">لدي حساب بالفعل</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة | Zorvexa</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:#fff;
}
header{
background:#111827;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}
.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}
.card{
background:#111827;
padding:20px;
border-radius:10px;
text-align:center;
}
.card h3{
margin-bottom:10px;
color:#00d4ff;
}
.card p{
color:#ccc;
}
button{
margin-top:15px;
padding:10px 20px;
background:#00d4ff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>
<body>

<header>لوحة إدارة Zorvexa</header>

<div class="container">

<div class="card">
<h3>المستخدمون</h3>
<p>إدارة حسابات المستخدمين.</p>
<button>فتح</button>
</div>

<div class="card">
<h3>المقالات</h3>
<p>إضافة وتعديل المقالات.</p>
<button>فتح</button>
</div>

<div class="card">
<h3>الإعدادات</h3>
<p>إعدادات المنصة.</p>
<button>فتح</button>
</div>

<div class="card">
<h3>الإحصائيات</h3>
<p>عرض بيانات المنصة.</p>
<button>فتح</button>
</div>

</div>

</body>
</html>

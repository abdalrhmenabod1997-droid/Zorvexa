<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | Zorvexa</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:#0b1220;
color:#fff;
}

header{
background:#111827;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00d4ff;
}

.container{
padding:30px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

h2{
margin-bottom:15px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-top:20px;
}

.item{
background:#1f2937;
padding:20px;
border-radius:10px;
text-align:center;
transition:.3s;
cursor:pointer;
}

.item:hover{
background:#00d4ff;
color:#000;
}
</style>

</head>
<body>

<header>
<div class="logo">Zorvexa</div>
<div>لوحة التحكم</div>
</header>

<div class="container">

<div class="card">
<h2>مرحبًا بك</h2>
<p>هذه هي لوحة التحكم الخاصة بك.</p>
</div>

<div class="menu">

<div class="item">الملف الشخصي</div>
<div class="item">المقالات</div>
<div class="item">الإعدادات</div>
<div class="item">الإشعارات</div>

</div>

</div>

</body>
</html>
